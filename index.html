<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Siswa TEI</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="LOGO SEKOLAH.png" alt="Logo" class="logo-img">
    <div class="brand">
        <span class="title">ABSENSI SISWA</span>
        <span class="sub-title">Teknik Elektronika Industri</span>
    </div>
  </div>
  <div class="header-right">
    <span id="clockText">00:00:00</span>
    <div class="fb-status">
      <div class="fb-dot" id="fbDot"></div>
      <span id="fbStatus">Connecting...</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="stats">
    <div class="stat blue">
      <div class="stat-label">Total</div>
      <div class="stat-val" id="sTotal">0</div>
      <div class="stat-sub">Record</div>
    </div>
    <div class="stat green">
      <div class="stat-label">Hadir</div>
      <div class="stat-val" id="sHadir">0</div>
      <div class="stat-sub" id="sHadirPct">—</div>
    </div>
    <div class="stat yellow">
      <div class="stat-label">Telat</div>
      <div class="stat-val" id="sTelat">0</div>
      <div class="stat-sub">Siswa</div>
    </div>
    <div class="stat red">
      <div class="stat-label">Alpha</div>
      <div class="stat-val" id="sAlpha">0</div>
      <div class="stat-sub">Siswa</div>
    </div>
  </div>

  <div class="grid">
    <div class="main-card-wrap">
      <div class="card">
        <div class="card-head">
          <div class="card-title">Data Kehadiran</div>
          <div class="head-actions">
            <input type="date" id="filterDate" onchange="applyDateFilter()">
            <button class="btn btn-primary" onclick="openModal()">+ Manual</button>
            <button class="btn btn-outline" onclick="exportCSV()">⬇ Excel/CSV</button>
          </div>
        </div>

        <div class="toolbar">
          <div class="search-wrapper">
             <input class="search" type="text" placeholder="Cari nama..." oninput="applyFilter()" id="searchBox">
          </div>
          <div class="chip-container">
            <div class="chip active" onclick="setStatus('semua',this)">Semua</div>
            <div class="chip" onclick="setStatus('hadir',this)">Hadir</div>
            <div class="chip" onclick="setStatus('terlambat',this)">Telat</div>
            <div class="chip" onclick="setStatus('izin',this)">Izin</div>
            <div class="chip" onclick="setStatus('alpha',this)">Alpha</div>
          </div>
        </div>

        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Siswa</th>
                <th>ID</th>
                <th>Waktu</th>
                <th>Acc</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="7" class="empty">Memuat data...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="side-card-wrap">
      <div class="card">
        <div class="card-head">
          <div class="card-title">Scan Terbaru</div>
          <span class="badge-count" id="feedCount">0</span>
        </div>
        <div class="feed" id="liveFeed">
          <div class="empty">Menunggu scan...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal">
    <h3>Input Manual</h3>
    <div class="form-row">
      <label>Nama</label>
      <input type="text" id="mNama">
    </div>
    <div class="form-row">
      <label>Kelas</label>
      <input type="text" id="mKelas">
    </div>
    <div class="form-row">
      <label>Status</label>
      <select id="mStatus">
        <option value="hadir">Hadir</option>
        <option value="terlambat">Terlambat</option>
        <option value="izin">Izin</option>
        <option value="alpha">Alpha</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="submitManual()">Simpan</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
